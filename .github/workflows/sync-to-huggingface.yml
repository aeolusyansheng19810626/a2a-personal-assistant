name: Sync to HuggingFace
on:
  push:
    branches: [demo]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://aeolusyansheng:$HF_TOKEN@huggingface.co/spaces/aeolusyansheng/a2a-personal-assistant
          git push huggingface demo:main --force
