[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:orchestrator]
command=uvicorn orchestrator.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/orchestrator.err.log
stdout_logfile=/var/log/supervisor/orchestrator.out.log
priority=1

[program:email_agent]
command=uvicorn email_agent.main:app --host 0.0.0.0 --port 8001
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/email_agent.err.log
stdout_logfile=/var/log/supervisor/email_agent.out.log
priority=2

[program:calendar_agent]
command=uvicorn calendar_agent.main:app --host 0.0.0.0 --port 8002
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/calendar_agent.err.log
stdout_logfile=/var/log/supervisor/calendar_agent.out.log
priority=3

[program:task_agent]
command=uvicorn task_agent.main:app --host 0.0.0.0 --port 8003
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/task_agent.err.log
stdout_logfile=/var/log/supervisor/task_agent.out.log
priority=4

[program:streamlit_ui]
command=streamlit run ui/app.py --server.port 7860 --server.address 0.0.0.0
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/streamlit.err.log
stdout_logfile=/var/log/supervisor/streamlit.out.log
priority=5

